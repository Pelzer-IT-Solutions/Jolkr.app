<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body { width: 1024px; height: 500px; overflow: hidden; }

    .banner {
      width: 1024px;
      height: 500px;
      display: flex;
      align-items: center;
      gap: 64px;
      padding: 0 96px;
    }

    .icon {
      width: 240px;
      height: 240px;
      flex-shrink: 0;
      filter: drop-shadow(0 20px 60px rgba(45, 212, 191, 0.3));
    }

    .text {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .wordmark {
      font-size: 96px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .tagline {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text-secondary);
      max-width: 540px;
    }

    .tagline .accent {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="glow-bg" style="--glow-x: 25%; --glow-y: 50%;"></div>
    <div class="content" style="display: flex; align-items: center; gap: 64px;">
      <img class="icon" src="../icon.svg" alt="Jolkr icon">
      <div class="text">
        <div class="wordmark">JOLKR</div>
        <div class="tagline">Chat &amp; voice,<br><span class="accent">encrypted by default</span>.</div>
      </div>
    </div>
  </div>
</body>
</html>
