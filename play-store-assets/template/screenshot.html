<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body { width: 1080px; height: 1920px; overflow: hidden; }

    .slot {
      width: 1080px;
      height: 1920px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .caption {
      position: absolute;
      top: 80px;
      left: 0;
      right: 0;
      font-size: 78px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      letter-spacing: -0.02em;
      padding: 0 80px;
      color: var(--text-primary);
      z-index: 2;
    }

    .caption .accent {
      color: var(--accent);
    }

    .phone-frame {
      width: 680px;
      height: 1432px;
      border-radius: 56px;
      background: #000;
      padding: 18px;
      box-shadow:
        0 40px 80px -20px rgba(0,0,0,0.6),
        0 0 0 2px rgba(255,255,255,0.05),
        0 0 80px rgba(45, 212, 191, 0.15);
      position: relative;
      z-index: 2;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      overflow: hidden;
      background: #1E1F22;
      object-fit: cover;
      object-position: center;
    }

    .brand-mark {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0.7;
      z-index: 2;
    }

    .brand-mark .accent-line {
      width: 64px;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
    }

    .brand-mark .name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="slot" id="slot">
    <div class="glow-bg"></div>
    <h1 class="caption" id="caption">Caption goes here</h1>
    <div class="phone-frame">
      <img class="phone-screen" id="phone-screen" alt="App screenshot">
    </div>
    <div class="brand-mark">
      <span class="accent-line"></span>
      <span class="name">JOLKR</span>
    </div>
  </div>

  <script>
    const SLOTS = {
      1: { caption: 'Build your <span class="accent">community</span>', img: '../raw/raw-1.png', glow: ['30%', '20%'] },
      2: { caption: 'Voice that <span class="accent">just works</span>', img: '../raw/raw-2.png', glow: ['70%', '25%'] },
      3: { caption: 'End-to-end <span class="accent">encrypted</span>', img: '../raw/raw-3.png', glow: ['50%', '15%'] },
      4: { caption: 'Express <span class="accent">yourself</span>', img: '../raw/raw-4.png', glow: ['25%', '30%'] },
      5: { caption: 'Powerful <span class="accent">by design</span>', img: '../raw/raw-5.png', glow: ['75%', '20%'] },
      6: { caption: 'Made for <span class="accent">mobile</span>', img: '../raw/raw-6.png', glow: ['50%', '25%'] }
    };

    const params = new URLSearchParams(window.location.search);
    const slotNum = parseInt(params.get('slot') || '1', 10);
    const slot = SLOTS[slotNum];

    document.getElementById('caption').innerHTML = slot.caption;
    document.getElementById('phone-screen').src = slot.img;
    document.querySelector('.glow-bg').style.setProperty('--glow-x', slot.glow[0]);
    document.querySelector('.glow-bg').style.setProperty('--glow-y', slot.glow[1]);
  </script>
</body>
</html>
