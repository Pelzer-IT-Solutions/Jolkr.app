# NATS Node A Configuration — Jolkr HA Cluster
# Placeholders are replaced at runtime by nats-entrypoint.sh

server_name: nats-node-a

port: 4222
http_port: 8222

max_payload: 8MB
write_deadline: "10s"

authorization {
  user: NATS_USER_PLACEHOLDER
  password: NATS_PASSWORD_PLACEHOLDER
}

cluster {
  name: jolkr-nats-cluster
  listen: 0.0.0.0:6222

  authorization {
    password: NATS_CLUSTER_PASSWORD_PLACEHOLDER
  }

  routes [
    nats-route://NATS_CLUSTER_PASSWORD_PLACEHOLDER@NODE_A_IP_PLACEHOLDER:6222
    nats-route://NATS_CLUSTER_PASSWORD_PLACEHOLDER@NODE_B_IP_PLACEHOLDER:6222
    nats-route://NATS_CLUSTER_PASSWORD_PLACEHOLDER@NODE_C_IP_PLACEHOLDER:6222
  ]
}

jetstream {
  store_dir: /data/jetstream
  max_mem: 256MB
  max_file: 2GB
}
