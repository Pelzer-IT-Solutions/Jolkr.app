# Redis Sentinel Configuration for Jolkr HA Cluster
# Runs on all 3 nodes (Node A, B, C)
# Placeholders are replaced by sentinel-entrypoint.sh at startup

# Network
bind 0.0.0.0
port 26379
protected-mode no

# Process
daemonize no
logfile ""

# Sentinel monitor configuration
# Monitor the Redis primary named "jolkr-redis"
# Quorum of 2: majority of 3 sentinels must agree for failover
sentinel monitor jolkr-redis NODE_A_IP_PLACEHOLDER 6379 2

# Authentication for the monitored master and replicas
sentinel auth-pass jolkr-redis REDIS_PASSWORD_PLACEHOLDER

# Failure detection: 5 seconds without response = down
sentinel down-after-milliseconds jolkr-redis 5000

# Failover timeout: 60 seconds
sentinel failover-timeout jolkr-redis 60000

# Only 1 replica syncs from the new master at a time during failover
sentinel parallel-syncs jolkr-redis 1

# Announce this sentinel's IP to other sentinels and clients
# Set dynamically via entrypoint using NODE_IP environment variable
sentinel announce-ip NODE_IP_PLACEHOLDER
sentinel announce-port 26379

# Security: prevent script reconfiguration via SENTINEL SET
sentinel deny-scripts-reconfig yes
