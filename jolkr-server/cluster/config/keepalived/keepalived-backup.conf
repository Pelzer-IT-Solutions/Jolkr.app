# =============================================================================
# Jolkr — Keepalived Configuration (BACKUP / Node B)
# =============================================================================
# This node starts as BACKUP with priority 90. It will take over the virtual IP
# when the MASTER's priority drops below 90 (due to API health check failure).
#
# Replace the following placeholders before deploying:
#   KEEPALIVED_INTERFACE_PLACEHOLDER  — network interface (e.g. eth0, ens18)
#   KEEPALIVED_PASSWORD_PLACEHOLDER   — shared VRRP auth password (max 8 chars)
#   VIRTUAL_IP_PLACEHOLDER            — the floating virtual IP address
#   VIRTUAL_IP_MASK_PLACEHOLDER       — subnet mask bits (e.g. 24)
# =============================================================================

vrrp_script chk_api {
    script "curl -sf http://localhost/health"
    interval 2
    weight -20
    fall 3
    rise 2
}

vrrp_instance VI_JOLKR {
    state BACKUP
    interface KEEPALIVED_INTERFACE_PLACEHOLDER
    virtual_router_id 51
    priority 90
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass KEEPALIVED_PASSWORD_PLACEHOLDER
    }

    virtual_ipaddress {
        VIRTUAL_IP_PLACEHOLDER/VIRTUAL_IP_MASK_PLACEHOLDER
    }

    track_script {
        chk_api
    }
}
