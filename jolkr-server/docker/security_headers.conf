add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://img.youtube.com https://i.ytimg.com https://cdn.jsdelivr.net https://fonts.gstatic.com; media-src 'self' blob: https:; connect-src 'self' https: wss://jolkr.app wss://localhost; frame-src https://www.youtube.com https://player.vimeo.com https://player.twitch.tv https://clips.twitch.tv https://www.tiktok.com https://vidmount.com https://www.facebook.com https://www.dailymotion.com https://www.bitchute.com https://play.vidyard.com https://open.spotify.com; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests;" always;
