# =============================================================================
# Jolkr — Nginx Reverse Proxy Configuration
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Rate Limiting Zones (per-IP)
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws_zone:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # -------------------------------------------------------------------------
    # Avatar/icon cache (stores WebP images from /api/avatars/ and /api/icons/)
    # -------------------------------------------------------------------------
    proxy_cache_path /var/cache/nginx/avatars levels=1:2 keys_zone=avatars:10m
                     max_size=256m inactive=7d use_temp_path=off;

    # -------------------------------------------------------------------------
    # Client settings
    # -------------------------------------------------------------------------
    client_max_body_size 26M;
    client_body_buffer_size 16k;

    # Slow client protection (Slowloris defense)
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 10s;
    reset_timedout_connection on;

    # -------------------------------------------------------------------------
    # Upstreams
    # -------------------------------------------------------------------------
    upstream jolkr_api {
        server jolkr-api:8080;
    }

    upstream jolkr_media {
        server jolkr-media:8081;
    }

    # -------------------------------------------------------------------------
    # CORS map — allowlist of trusted origins only
    # -------------------------------------------------------------------------
    map $http_origin $cors_origin {
        default "";
        "~^https://jolkr\.app$"             $http_origin;
        "~^https://tauri\.localhost$"        $http_origin;
        "~^http://tauri\.localhost$"         $http_origin;
        "~^http://localhost(:[0-9]+)?$"      $http_origin;
        "~^https?://192\.168\.\d+\.\d+(:[0-9]+)?$" $http_origin;
    }

    # Hide nginx version from response headers and error pages
    server_tokens off;

    # -------------------------------------------------------------------------
    # HTTP Server (port 80) — redirect all traffic to HTTPS
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS Server (port 443)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ----- Security Headers -----------------------------------------------
        include /etc/nginx/security_headers.conf;

        # ----- CORS Headers ---------------------------------------------------
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Vary Origin always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ----- Prometheus metrics → API (internal only) -------------------------
        location /metrics {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            include /etc/nginx/security_headers.conf;
            add_header Cache-Control "no-cache, no-store" always;
        }

        # ----- Health check ---------------------------------------------------
        location /health {
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept $http_accept;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            include /etc/nginx/security_headers.conf;
            add_header Cache-Control "no-cache, no-store" always;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Vary Origin always;
        }

        # ----- Auth routes (strict rate limit) --------------------------------
        location /api/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ----- Avatar / icon image proxy (cached, public, no auth) -----------
        location ~ ^/api/(avatars|icons)/ {
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            proxy_cache avatars;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;
            include /etc/nginx/security_headers.conf;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
            add_header Access-Control-Allow-Origin $cors_origin always;
        }

        # ----- API routes -----------------------------------------------------
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ----- WebSocket -----------------------------------------------------
        location /ws {
            limit_req zone=ws_zone burst=3 nodelay;
            limit_conn addr 10;
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ----- S3/MinIO proxy ------------------------------------------------
        location /s3/ {
            proxy_pass http://minio:9000/;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # ----- Media WebSocket -----------------------------------------------
        location /media/ws/ {
            proxy_pass http://jolkr_media/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ----- Media routes ---------------------------------------------------
        location /media/ {
            proxy_pass http://jolkr_media/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ----- Auto-updater --------------------------------------------------
        location /updates/ {
            alias /usr/share/nginx/html/updates/;
            include /etc/nginx/security_headers.conf;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache" always;
            try_files $uri /updates/latest.json;
        }

        # ----- Web app (SPA) -------------------------------------------------
        # ----- Twitch embed bridge ------------------------------------------
        # A static HTML page that loads Twitch's player with parent=jolkr.app.
        # Tauri (origin "tauri.localhost") cannot embed Twitch directly because
        # Twitch verifies window.parent.location, so we serve this page with
        # relaxed framing headers and let it iframe Twitch on jolkr.app's behalf.
        location = /app/twitch-embed.html {
            alias /usr/share/nginx/html/app/twitch-embed.html;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-src https://player.twitch.tv https://clips.twitch.tv; frame-ancestors *; base-uri 'self';" always;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin $cors_origin always;
        }

        location /app {
            alias /usr/share/nginx/html/app;
            index index.html;
            try_files $uri $uri/ /app/index.html;
            include /etc/nginx/security_headers.conf;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Access-Control-Allow-Origin $cors_origin always;

            location ~* \.(?:js|css|woff2?|ttf|eot)$ {
                include /etc/nginx/security_headers.conf;
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                add_header Access-Control-Allow-Origin $cors_origin always;
            }
        }

        # ----- Landing page ---------------------------------------------------
        location / {
            root /usr/share/nginx/html/landing;
            index index.html;
            try_files $uri $uri/ /index.html;
            include /etc/nginx/security_headers.conf;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }
}
