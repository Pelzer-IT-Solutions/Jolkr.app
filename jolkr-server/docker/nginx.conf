# =============================================================================
# Jolkr — Nginx Reverse Proxy Configuration
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Client settings
    # -------------------------------------------------------------------------
    client_max_body_size 100M;
    client_body_buffer_size 16k;

    # -------------------------------------------------------------------------
    # Upstreams
    # -------------------------------------------------------------------------
    upstream jolkr_api {
        server jolkr-api:8080;
    }

    upstream jolkr_media {
        server jolkr-media:8081;
    }

    # -------------------------------------------------------------------------
    # CORS map — echo requesting origin, fallback to * if no Origin header
    # -------------------------------------------------------------------------
    map $http_origin $cors_origin {
        default "*";
        "~^https?://" $http_origin;
    }

    # -------------------------------------------------------------------------
    # HTTP Server (port 80)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # ----- CORS Headers (applied to all locations) -----------------------
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Vary Origin always;

        # ----- Preflight requests --------------------------------------------
        # Server-level add_header directives above are inherited by this return
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ----- Health check → API (real service status) -----------------------
        location /health {
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept $http_accept;

            # Strip upstream CORS headers — nginx is the single CORS source
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            add_header Cache-Control "no-cache, no-store" always;
        }

        # ----- API routes → jolkr-api ---------------------------------------
        location /api/ {
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strip upstream CORS headers — nginx is the single CORS source
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ----- WebSocket → jolkr-api ----------------------------------------
        location /ws {
            proxy_pass http://jolkr_api;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strip upstream CORS headers — nginx is the single CORS source
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            # Long-lived connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ----- S3/MinIO storage proxy -----------------------------------------
        # Presigned URLs use internal hostname minio:9000 which browsers can't
        # reach. This proxy forwards requests to MinIO with the correct Host
        # header so presigned signatures remain valid.
        location /s3/ {
            proxy_pass http://minio:9000/;
            proxy_http_version 1.1;

            # Must match the host used when generating presigned URLs
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Strip upstream CORS headers — nginx is the single CORS source
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Allow large file downloads
            proxy_buffering off;
        }

        # ----- Media WebSocket → jolkr-media ----------------------------------
        location /media/ws/ {
            proxy_pass http://jolkr_media/ws/;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strip upstream CORS headers — nginx is the single CORS source
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            # Long-lived connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ----- Media routes → jolkr-media ------------------------------------
        location /media/ {
            proxy_pass http://jolkr_media/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Strip upstream CORS headers — nginx is the single CORS source
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ----- Auto-updater endpoint — serves static JSON manifest -----------
        location /updates/ {
            alias /usr/share/nginx/html/updates/;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache" always;
            try_files $uri /updates/latest.json;
        }

        # ----- Web app (SPA) on /app ------------------------------------------
        location /app {
            alias /usr/share/nginx/html/app;
            index index.html;
            try_files $uri $uri/ /app/index.html;

            # index.html must never be cached — forces browser to load new bundles
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Access-Control-Allow-Origin $cors_origin always;

            # Hashed assets (js/css) — cache aggressively
            location ~* \.(?:js|css|woff2?|ttf|eot)$ {
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                add_header Access-Control-Allow-Origin $cors_origin always;
            }
        }

        # ----- Landing page on / -------------------------------------------
        location / {
            root /usr/share/nginx/html/landing;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS Server (port 443) — uncomment when certs are available
    # -------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Include the same location blocks as the HTTP server above.
    # }
}
