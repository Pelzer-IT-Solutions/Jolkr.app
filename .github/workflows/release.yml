name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ─── Desktop builds (Windows, macOS, Linux) ───
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: jolkr-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install dependencies
        run: cd jolkr-app && npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: jolkr-app
          tagName: ${{ github.ref_name }}
          releaseName: 'Jolkr ${{ github.ref_name }}'
          releaseBody: 'See changelog for details.'
          releaseDraft: true
          prerelease: false

  # ─── Android build ───
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: jolkr-app/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install dependencies
        run: cd jolkr-app && npm ci

      - name: Decode Android keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/android-keystore.jks

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd jolkr-app
          npx tauri android build --apk

      - name: Remove unsigned APKs and rename signed APK
        id: find-apk
        run: |
          find jolkr-app/src-tauri/gen/android -name '*unsigned*' -type f -delete
          APK_PATH=$(find jolkr-app/src-tauri/gen/android -name '*.apk' -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No signed APK found!"
            exit 1
          fi
          RENAMED="jolkr-app/src-tauri/gen/android/Jolkr_${{ github.ref_name }}_android.apk"
          mv "$APK_PATH" "$RENAMED"
          echo "apk_path=$RENAMED" >> "$GITHUB_OUTPUT"
          echo "Renamed APK: $APK_PATH → $RENAMED"

      - name: Upload signed APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Jolkr ${{ github.ref_name }}'
          draft: true
          files: ${{ steps.find-apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Post-release: bump version for next development cycle ───
  version-bump:
    needs: [build-desktop, build-android]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version
        id: next
        run: |
          # Strip 'v' prefix from tag: v0.3.0 → 0.3.0
          CURRENT="${GITHUB_REF_NAME#v}"
          # Bump patch: 0.3.0 → 0.4.0
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="$MAJOR.$((MINOR + 1)).0"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping version: $CURRENT → $NEXT"

      - name: Update version in all files
        env:
          CURRENT: ${{ github.ref_name }}
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          CURRENT_VER="${CURRENT#v}"

          # Frontend
          sed -i "s/\"version\": \"$CURRENT_VER\"/\"version\": \"$NEXT\"/" jolkr-app/package.json
          sed -i "s/\"version\": \"$CURRENT_VER\"/\"version\": \"$NEXT\"/" jolkr-app/src-tauri/tauri.conf.json

          # Tauri Rust crate
          sed -i "s/^version = \"$CURRENT_VER\"/version = \"$NEXT\"/" jolkr-app/src-tauri/Cargo.toml

          # Backend workspace
          sed -i "s/^version = \"$CURRENT_VER\"/version = \"$NEXT\"/" jolkr-server/Cargo.toml

          # Regenerate lockfile with new version
          cd jolkr-app && npm install --package-lock-only && cd ..

          echo "Updated files:"
          grep -n '"version"' jolkr-app/package.json jolkr-app/src-tauri/tauri.conf.json
          grep -n '^version' jolkr-app/src-tauri/Cargo.toml jolkr-server/Cargo.toml

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Version already bumped — nothing to commit"
          else
            git commit -m "chore: bump version to ${{ steps.next.outputs.version }} after ${{ github.ref_name }} release"
            git push origin main
          fi

  # ─── iOS build (disabled — requires Apple Developer Account) ───
  # build-ios:
  #   ...
