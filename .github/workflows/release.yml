name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build (e.g. v0.10.0). Skips desktop builds and Play Store upload (Android-only re-run).'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ─── Desktop builds (Windows, macOS, Linux) ───
  build-desktop:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: jolkr-app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install dependencies
        run: cd jolkr-app && npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: jolkr-app
          tagName: ${{ github.ref_name }}
          releaseName: 'Jolkr ${{ github.ref_name }}'
          releaseBody: 'See changelog for details.'
          releaseDraft: true
          prerelease: false

  # ─── Android build ───
  build-android:
    runs-on: ubuntu-latest

    env:
      VERSION_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: jolkr-app/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install dependencies
        run: cd jolkr-app && npm ci

      - name: Decode Android keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/android-keystore.jks

      - name: Build Android APK + AAB
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd jolkr-app
          npx tauri android build --apk --aab

      - name: Remove unsigned APKs and rename signed APK
        id: find-apk
        run: |
          find jolkr-app/src-tauri/gen/android -name '*unsigned*' -type f -delete
          APK_PATH=$(find jolkr-app/src-tauri/gen/android -name '*.apk' -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No signed APK found!"
            exit 1
          fi
          RENAMED="jolkr-app/src-tauri/gen/android/Jolkr_${VERSION_REF}_android.apk"
          mv "$APK_PATH" "$RENAMED"
          echo "apk_path=$RENAMED" >> "$GITHUB_OUTPUT"
          echo "Renamed APK: $APK_PATH → $RENAMED"

      - name: Locate AAB
        id: find-aab
        run: |
          AAB_PATH=$(find jolkr-app/src-tauri/gen/android -name '*.aab' -type f | head -1)
          if [ -z "$AAB_PATH" ]; then
            echo "ERROR: No AAB found!"
            exit 1
          fi
          RENAMED_AAB="jolkr-app/src-tauri/gen/android/Jolkr_${VERSION_REF}_android.aab"
          mv "$AAB_PATH" "$RENAMED_AAB"
          echo "aab_path=$RENAMED_AAB" >> "$GITHUB_OUTPUT"
          echo "Located AAB: $AAB_PATH → $RENAMED_AAB"

      - name: Sign AAB with jarsigner (Tauri --aab does not auto-sign)
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          AAB_PATH: ${{ steps.find-aab.outputs.aab_path }}
        run: |
          jarsigner -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            "$AAB_PATH" \
            "$ANDROID_KEY_ALIAS"
          jarsigner -verify -verbose -certs "$AAB_PATH" | tail -3

      - name: Upload APK + AAB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jolkr-android-${{ env.VERSION_REF }}
          path: |
            ${{ steps.find-apk.outputs.apk_path }}
            ${{ steps.find-aab.outputs.aab_path }}
          retention-days: 14

      - name: Upload signed APK to Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Jolkr ${{ github.ref_name }}'
          draft: true
          files: ${{ steps.find-apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB to Play Store internal track
        if: github.event_name == 'push'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: io.jolkr.app
          releaseFiles: ${{ steps.find-aab.outputs.aab_path }}
          track: internal
          # 'draft' is required while the app itself is still in draft on
          # Play Console (= not yet officially published). Once the app is
          # promoted to a public testing track or production, switch to
          # 'completed' so internal releases roll out automatically.
          status: draft
          releaseName: ${{ github.ref_name }}

  # ─── iOS build (disabled — requires Apple Developer Account) ───
  # build-ios:
  #   ...
