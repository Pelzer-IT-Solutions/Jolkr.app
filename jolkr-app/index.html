<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/app/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Jolkr</title>
    <!-- Loaded sync so the dark-class lands before first paint. Extracted from
         an inline <script> so the strict CSP can drop `script-src 'unsafe-inline'`. -->
    <script src="/app/theme-init.js"></script>
    <style>
      html       { background: oklch(14% 0.01 137) } /* dark default */
      html:not(.dark) { background: oklch(96% 0.01 137) } /* light */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
