<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/app/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Jolkr</title>
    <script>
      // Apply theme BEFORE any rendering to prevent flash. Default to dark
      // unless an explicit 'light' preference is saved or the OS reports a
      // light preference. WebView2 on Tauri Windows may report the wrong
      // matchMedia value; main.tsx queries the OS theme via the Tauri API
      // and corrects the class if needed before the first paint settles.
      (function(){
        var p = localStorage.getItem('jolkr-color-mode');
        var explicitLight = p === 'light' || (p !== 'dark' && matchMedia('(prefers-color-scheme: light)').matches);
        if (!explicitLight) document.documentElement.classList.add('dark');
      })();
    </script>
    <style>
      html       { background: oklch(14% 0.01 137) } /* dark default */
      html:not(.dark) { background: oklch(96% 0.01 137) } /* light */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
